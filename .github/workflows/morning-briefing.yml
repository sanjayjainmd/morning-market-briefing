name: Morning Market Briefing

on:
  schedule:
    # 10:09 AM EDT (UTC-4) = 14:09 UTC, Tue & Fri only
    - cron: "9 14 * * 2,5"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # allow committing the saved briefing back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: python briefing.py

      - name: Archive briefing to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DailyBriefings/
          if git diff --staged --quiet; then
            echo "No new briefing to commit."
          else
            git commit -m "Briefing $(date -u +%Y-%m-%d)"
            git push
          fi
